<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Home Care Industries</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: "Segoe UI", sans-serif;
      min-height:100vh;
      overflow:hidden;
      background:
        linear-gradient(135deg,#0f172a,#111827,#1e293b);
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    /* Floating bubbles */
    .bubble{
      position:absolute;
      bottom:-120px;
      background:rgba(255,255,255,0.08);
      border-radius:50%;
      animation: floatUp linear infinite;
      backdrop-filter: blur(4px);
    }

    @keyframes floatUp{
      to{
        transform:translateY(-120vh) rotate(360deg);
      }
    }

    .container{
      width:90%;
      max-width:1200px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:60px;
      align-items:center;
      z-index:2;
    }

    .left{
      animation:slideLeft 1s ease;
    }

    @keyframes slideLeft{
      from{
        opacity:0;
        transform:translateX(-60px);
      }
      to{
        opacity:1;
        transform:translateX(0);
      }
    }

    .badge{
      display:inline-block;
      padding:10px 18px;
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:50px;
      margin-bottom:25px;
      font-size:14px;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    h1{
      font-size:120px;
      line-height:1;
      font-weight:800;
      background:linear-gradient(90deg,#38bdf8,#22c55e,#facc15);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:pulse 3s infinite;
    }

    @keyframes pulse{
      0%,100%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.03);
      }
    }

    h2{
      font-size:42px;
      margin:20px 0;
      line-height:1.2;
    }

    p{
      color:#cbd5e1;
      font-size:18px;
      line-height:1.8;
      margin-bottom:35px;
      max-width:520px;
    }

    .buttons{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    .btn{
      padding:16px 28px;
      border:none;
      border-radius:14px;
      text-decoration:none;
      font-weight:600;
      transition:0.35s ease;
      position:relative;
      overflow:hidden;
    }

    .btn-primary{
      background:linear-gradient(90deg,#22c55e,#16a34a);
      color:white;
      box-shadow:0 10px 30px rgba(34,197,94,0.35);
    }

    .btn-primary:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 40px rgba(34,197,94,0.45);
    }

    .btn-secondary{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      color:white;
    }

    .btn-secondary:hover{
      background:rgba(255,255,255,0.15);
      transform:translateY(-4px);
    }

    /* Right side illustration */
    .right{
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      animation:slideRight 1s ease;
    }

    @keyframes slideRight{
      from{
        opacity:0;
        transform:translateX(60px);
      }
      to{
        opacity:1;
        transform:translateX(0);
      }
    }

    .factory{
      width:380px;
      height:380px;
      position:relative;
    }

    .circle{
      width:100%;
      height:100%;
      border-radius:50%;
      background:linear-gradient(
        135deg,
        rgba(56,189,248,0.25),
        rgba(34,197,94,0.15)
      );
      border:1px solid rgba(255,255,255,0.12);
      position:absolute;
      animation:rotate 18s linear infinite;
    }

    @keyframes rotate{
      to{
        transform:rotate(360deg);
      }
    }

    .bottle{
      position:absolute;
      width:120px;
      height:220px;
      background:linear-gradient(180deg,#38bdf8,#0ea5e9);
      border-radius:30px;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      box-shadow:0 20px 50px rgba(14,165,233,0.45);
      animation:float 4s ease-in-out infinite;
    }

    .bottle::before{
      content:"";
      position:absolute;
      width:55px;
      height:35px;
      background:#e2e8f0;
      top:-22px;
      left:50%;
      transform:translateX(-50%);
      border-radius:10px;
    }

    .bottle::after{
      content:"HOME CARE";
      position:absolute;
      width:100%;
      text-align:center;
      top:90px;
      font-size:16px;
      font-weight:700;
      letter-spacing:2px;
      color:white;
    }

    @keyframes float{
      0%,100%{
        transform:translate(-50%,-50%) translateY(0);
      }
      50%{
        transform:translate(-50%,-50%) translateY(-18px);
      }
    }

    .spark{
      position:absolute;
      width:16px;
      height:16px;
      background:#facc15;
      border-radius:50%;
      box-shadow:0 0 20px #facc15;
      animation:sparkle 2s infinite;
    }

    @keyframes sparkle{
      0%,100%{
        opacity:0.2;
        transform:scale(0.7);
      }
      50%{
        opacity:1;
        transform:scale(1.3);
      }
    }

    .s1{ top:40px; left:80px; }
    .s2{ bottom:60px; right:40px; animation-delay:1s; }
    .s3{ top:100px; right:70px; animation-delay:0.5s; }

    footer{
      position:absolute;
      bottom:25px;
      left:50%;
      transform:translateX(-50%);
      color:#94a3b8;
      font-size:14px;
      letter-spacing:1px;
    }

    @media(max-width:900px){

      body{
        overflow:auto;
        padding:40px 0;
      }

      .container{
        grid-template-columns:1fr;
        text-align:center;
      }

      p{
        margin:auto auto 35px;
      }

      .buttons{
        justify-content:center;
      }

      h1{
        font-size:90px;
      }

      h2{
        font-size:32px;
      }

      .factory{
        width:300px;
        height:300px;
      }
    }

  </style>
</head>

<body>

  <!-- Floating bubbles -->
  <div class="bubble" style="left:10%; width:40px; height:40px; animation-duration:12s;"></div>
  <div class="bubble" style="left:20%; width:70px; height:70px; animation-duration:18s;"></div>
  <div class="bubble" style="left:35%; width:30px; height:30px; animation-duration:10s;"></div>
  <div class="bubble" style="left:50%; width:90px; height:90px; animation-duration:22s;"></div>
  <div class="bubble" style="left:65%; width:50px; height:50px; animation-duration:16s;"></div>
  <div class="bubble" style="left:80%; width:75px; height:75px; animation-duration:20s;"></div>

  <div class="container">

    <div class="left">

      <div class="badge">
        Home Care Manufacturing
      </div>

      <h1>404</h1>

      <h2>
        Cleaning Innovation Lost in Transit
      </h2>

      <p>
        The page you’re searching for has been removed,
        relocated, or never entered our production line.
        Let’s get you back to premium home care solutions.
      </p>

      <div class="buttons">
        <a href="/" class="btn btn-primary">
          Return Home
        </a>

        <a href="/products" class="btn btn-secondary">
          Explore Products
        </a>
      </div>

    </div>

    <div class="right">

      <div class="factory">

        <div class="circle"></div>

        <div class="bottle"></div>

        <div class="spark s1"></div>
        <div class="spark s2"></div>
        <div class="spark s3"></div>

      </div>

    </div>

  </div>

  <footer>
    © 2026 Home Care Industries • Cleanliness Engineered
  </footer>

</body>
</html>
